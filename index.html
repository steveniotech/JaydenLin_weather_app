<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <link
      href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap"
      rel="stylesheet"
    />
    <title>Weather app</title>
  </head>
  <body>
    <div class="container">
      <p><b id="tempnow"></b></p>
      <h1 id="time"></h1>
      <button onclick="loadCL()">My Location</button>
      <button onclick="metric = !metric;">Switch Units of Measurement</button>

      <div class="cityInput">
        <input placeholder="insert city" id="city" />
        <button id="subm">Submit</button>
      </div>
      <div class = "citySelect" id = "citySelect"></div>
      <canvas id="wgraph" width="500" height="300"> </canvas>
      <div class="wresults" id="wresults"></div>
    </div>
  </body>
</html>
